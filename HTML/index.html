<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../CSS/index.css" rel="stylesheet">
    <script src="../JS/index.js" defer></script>
    <title>Manacala</title>
</head>
<body>
    <div class="game-container">
        <div id="startForm">
            <div class="start-box">
                <h2>בחרו שמות לשחקנים</h2>
                <input type="text" id="name1" placeholder="שם שחקן א">
                <input type="text" id="name2" placeholder="שם שחקן ב">
                <button id="startBtn" type="button">התחל משחק</button>
            </div>
        </div>
        <div class="turn-display" id="turnDisplay"></div>
        <div id="message"></div>
   <div class="grid-container">
      <div class="grid-item-store1" id="store1">player 2-0</div>
      <div class="grid-item-store2" id="store2">player 1-7 </div>
      <div class="grid-item" id="pit1" onclick="check(event)">Item 1</div>
      <div class="grid-item" id="pit2" onclick="check(event)">Item 2</div>
      <div class="grid-item" id="pit3" onclick="check(event)">Item 3</div>
      <div class="grid-item" id="pit4" onclick="check(event)">Item 4</div>
      <div class="grid-item" id="pit5" onclick="check(event)">Item 5</div>
      <div class="grid-item" id="pit6" onclick="check(event)">Item 6</div>
      <div class="grid-item" id="pit13" onclick="check(event)">Item 13</div>
      <div class="grid-item" id="pit12" onclick="check(event)">Item 12</div>
      <div class="grid-item" id="pit11" onclick="check(event)">Item 11</div>
      <div class="grid-item" id="pit10" onclick="check(event)">Item 10</div>
      <div class="grid-item" id="pit9" onclick="check(event)">Item 9</div>
      <div class="grid-item" id="pit8" onclick="check(event)">Item 8</div>
   </div>
   </div>
</body>
</html>
